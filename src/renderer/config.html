<!DOCTYPE html>
<html class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>APL Ref Setup</title>
    <link rel="stylesheet" href="css/tailwind.css" />
    <script>
      // Default to dark theme
      document.documentElement.classList.add('dark');
    </script>
  </head>
  <body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100">
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-5 mb-4" id="room-setup">
        <h2 class="text-lg font-medium mb-3">Enter Config</h2>

        <p class="text-gray-600 dark:text-gray-400 text-sm mb-2">This can be found at the bottom of the OAuth section on your settings</p>
        <p class="text-gray-600 dark:text-gray-400 text-sm mb-2">See <a class="text-sky-400 hover:text-sky-600" href="https://github.com/applearon/apl-ref/blob/main/SETUP.md" target="_blank">SETUP.md</a> for instructions.</p>
        <div class="flex flex-wrap gap-3 mb-3">
          <div class="w-full md:w-1/3">
            <label class="text-sm text-gray-600 dark:text-gray-400 block mb-1">Client ID</label>
            <input id="client-id" type="number" class="w-full border border-gray-300 dark:border-gray-600 rounded px-2 py-1 bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-100" />
          </div>
          <div class="w-full md:w-1/3">
            <label class="text-sm text-gray-600 dark:text-gray-400 block mb-1">Client Secret</label>
            <input id="client-secret" type="text" class="w-full border border-gray-300 dark:border-gray-600 rounded px-2 py-1 bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-100" />
          </div>
        </div>
        <div class="action-row">
          <button id="save-config" class="bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded">Save</button>
          <span class="result-msg" id="make-room-result"></span>
        </div>
        <script >
            function int(id) { return parseInt(document.getElementById(id).value, 10) }
            function str(id) { return document.getElementById(id).value.trim() }

            document.getElementById("save-config").addEventListener('click', () => {
            const id = int('client-id')
            const secret = str('client-secret')
            console.log(id, secret)
            window.api.config.SendConfig(id, secret)
            })
            console.log("hi")
        </script>
  </body>
</html>
